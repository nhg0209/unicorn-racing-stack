detect:
  ros__parameters:
    rate_detect: 40
    min_size_n: 5
    min_size_m: 0.29999999999999999
    max_size_m: 0.59999999999999998
    lambda_deg: 10
    sigma: 0.029999999999999999
    min_2_points_dist: 0.01
    new_cluster_threshold_m: 0.40000000000000002
    max_viewing_distance: 10   # 15->10: 40 m track, 15 m saw obstacles half a lap away (too early).
    boundaries_inflation: 0.15  # 0.10->0.15: reject wall points nearer the track bound as false obstacles.
    filter_kernel_size: 7
    measure: false
    from_bag: false
    save_params: false
tracking:
  ros__parameters:
    save_params: false
    rate_tracking: 40
    P_vs: 0.2
    P_d: 0.02
    P_vd: 0.2
    measurment_var_s: 0.002
    measurment_var_d: 0.002
    measurment_var_vs: 0.2
    measurment_var_vd: 0.2
    process_var_vs: 2.0
    process_var_vd: 8.0
    max_dist: 0.5
    var_pub: 1.0
    aggro_multi: 2.0
    dist_deletion: 7.0
    dist_infront: 11.0   # 14->11: forward interest distance; tightens how far ahead a track counts as "in front".
    max_std: 0.2
    min_std: 0.16
    min_nb_meas: 6
    # false = keep a tracked STATIC obstacle alive across missed detection frames (memory on).
    # With true + low ttl_static the obstacle was dropped after 3 missed frames, so /tracking/obstacles
    # flickered empty and the spline/OVERTAKE commit flickered -> the car crawled up before avoiding.
    noMemoryMode: true
    debug_mode: false
    publish_static: true
    ratio_to_glob_path: 0.6
    ttl_dynamic: 40
    # frames a static obstacle survives without a fresh detection (40 Hz -> 40 = 1.0 s).
    # raised 3 -> 15 -> 40: close-range detect gaps on wall-adjacent boxes ran ~0.5 s+, killing
    # the track; the re-classification delay (staticFlag None -> not on /tracking/obstacles)
    # then blanked the planner (n=0 flicker, SM never committed OVERTAKE -> car stuck trailing)
    # AND fed the layer's unlatch streak (spurious UNLATCH -> re-CONFIRM flap). While the track
    # memory lives, is_visible stays truthful via the observability test, so a physically
    # removed obstacle still unlatches ~1.5 s after removal (memory decay + clear streak).
    ttl_static: 40
    vs_reset: 0.1
    # position-persistence demotion guard: a CONFIRMED static obstacle reverts to dynamic only when
    # the measured position stays > demote_disp_m from its mean (or the window speed stays above
    # demote_speed_mps) for demote_time_s (so single-frame noise can't flip a genuinely static box).
    # demote_disp_m MUST stay clearly below max_dist (0.5): association uses the SAME
    # measurement-to-mean distance, so 0.5/0.5 was a DEADLOCK — a moving opponent lost
    # association (spawning a fresh track) before the demote counter could ever fill,
    # and the stale track stayed is_static=True forever.
    demote_disp_m: 0.3
    demote_time_s: 0.2
    # window-speed classification: mean speed over the measurement window (net displacement/time).
    # The position-std vote alone called ANY opponent slower than ~3.7 m/s "static" right after
    # track birth (std of a mover over the young 0.15 s window is only v*T/sqrt(12)) -> the
    # static planner splined around the moving car. A track may vote static only below
    # static_speed_max_mps; above demote_speed_mps the static vote hard-resets / a confirmed
    # static demotes (sustained for demote_time_s).
    static_speed_max_mps: 0.4
    demote_speed_mps: 0.6
    # a track whose measurement lies within this radius of an initialized DYNAMIC track is a
    # spare detection cluster of that car (the box detector splits the opponent into 2 clusters
    # at times): it may not VOTE static -> no confirmed-static ghost riding the opponent.
    # Demotion of already-confirmed statics is unaffected, so a real box the opponent passes
    # close to keeps its static flag.
    near_dynamic_suppress_m: 0.6
    # Livox path (no /scan): a spot counts as observable within this range (the MID-360 sees
    # 360 deg, so range is the limiter). Replaces the old unconditional "visible".
    livox_max_view_dist: 7.0
    measure: false
    from_bag: false