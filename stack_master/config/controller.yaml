controller_manager:
  ros__parameters:
    t_clip_min: 0.7
    t_clip_max: 8.0
    # cap on the sqrt(2)*lat_err lookahead LOWER-bound inflation. Post-swap the car can sit
    # ~1 m off the new global line (deadlock-breaker commit); uncapped, the anti-swerve bound
    # stretched the L1 through 0.7 m corner zones -> corner-cut into the wall on the 1.4 m track.
    l1_lat_err_cap: 1.0
    m_l1: 0.47
    q_l1: -0.2
    speed_lookahead: 0.25
    lat_err_coeff: 1.0
    acc_scaler_for_steer: 1.0
    dec_scaler_for_steer: 1.0
    start_scale_speed: 6.5
    end_scale_speed: 10.0
    downscale_factor: 0.5
    speed_lookahead_for_steer: 0.0
    trailing_gap: 1.55
    trailing_vel_gain: 0.25
    trailing_p_gain: 1.35
    trailing_i_gain: 0.0
    trailing_d_gain: 1.0
    blind_trailing_speed: 1.5
    curvature_factor: 0.145
    speed_factor_for_lat_err: 1.0
    speed_factor_for_curvature: 1.0
    KP: 0.8
    KI: 0.0
    KD: 0.05
    heading_error_thres: 10.0
    steer_gain_for_speed: 1.0
    future_constant: 0.05
    AEB_thres: 0.5
    # OVERTAKE only: the avoidance line is legitimately offset from the car, so the garbage-path
    # AEB needs more slack there or it clamps to 2 m/s mid-maneuver.
    AEB_thres_overtake: 0.9
    speed_diff_thres: 0.1
    start_speed: 10.0
    start_curvature_factor: 1.5
    # FTG (FTGONLY state) - ROS1 /state_machine/* values; range_offset MUST be >0
    # or FTG.process_lidar slices ranges[0:-0]=[] and crashes on entering FTGONLY.
    ftg_debug: false
    ftg_safety_radius: 40
    ftg_max_lidar_dist: 9.0
    ftg_max_speed: 6.0
    ftg_range_offset: 180
    ftg_track_width: 2.6
    save_params: false
