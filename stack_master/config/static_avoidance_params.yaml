# Params for the Frenet grid-sampling static-avoidance planner (node: static_avoidance_planner,
# planner/spliner/spliner/static_avoidance_node.py). Loaded in race.launch.xml via <param from=.../>.
# All values are live-reconfigurable (ros2 param set /static_avoidance_planner <name> <val>).
static_avoidance_planner:
  ros__parameters:
    measure: true          # publish /planner/avoidance/latency (loop time) for the <10 ms budget check
    from_bag: false

    # --- planning horizon (bounds how far ahead an obstacle is considered) ---
    lookahead_min: 8.0      # [m]  minimum planning distance ahead of the car
    lookahead_k: 1.5        # [s]  lookahead = max(lookahead_min, lookahead_k * cur_vs)

    # --- terminal-offset sampling ---
    n_d_samples: 10         # number of lateral offsets sampled across the drivable width at the obstacle
    sample_gaps: true       # sample the two DRIVABLE GAPS beside the obstacle (box-edge -> wall on each
                            #   side) instead of a uniform sweep of the whole corridor. On a wide, lopsided
                            #   corridor (map f's wall-hugging raceline) the uniform sweep put ~all samples
                            #   on the roomy side and gave the narrow free gap ZERO candidates -> avoidance
                            #   flipped to the wrong side. Gap-anchored sampling always covers both sides
                            #   that have room. false = legacy uniform sweep (n_d_samples across corridor).
    width_car: 0.30         # [m]  car width (half is reserved as clearance to walls/obstacles)
    safety_margin: 0.15     # [m]  extra clearance around the obstacle box. obs_margin = half_car(0.15)+
                            #      safety must cover the SIM ego collision radius (0.29 m = half car
                            #      LENGTH in gym_bridge); 0.16 -> 0.31 clears it so the car no longer
                            #      grazes-then-teleports. Lower live (ros2 param set) if a tight section
                            #      rejects every candidate; raise if the car still clips the box.
    wall_margin: 0.1       # [m]  how close to the wall a candidate may reach (corridor room)

    # --- maneuver shape: gentle ramp OUT -> APEX (peak offset at obstacle, curvature loaded) -> gentle ramp back ---
    # Two quintics meet at the apex; outer ends are tangent to the raceline (d''=0) so entry/exit are
    # gentle and the sharpest bend sits right beside the obstacle. Must still return to the raceline
    # (a held offset violates the narrow corridor downstream -> all-red). Slalom handled by replanning.
    shift_min: 1.0          # [m]  min apex arc length (keeps the apex ahead of the car when very close)
    shift_buffer: 1.0       # [m]  (unused in apex-loaded profile; kept for param compatibility)
    ramp_len: 3.0           # [m]  gentle entry-ramp length (raceline -> apex)
    hold_after: 0.5         # [m]  (unused in apex-loaded profile; kept for param compatibility)
    return_len: 3.0         # [m]  gentle exit-ramp length (apex -> raceline)
    apex_bulge: 0.10        # [m] extra offset at the box CENTRE beyond the clearance value: the path peaks
                            #      here (widest, furthest from the obstacle). higher = swing WIDER around the
                            #      obstacle; 0 = flat hold. Limited by corridor (bulge past the wall -> reject).
    max_weave: 2            # max obstacles woven into ONE path (slalom). At 1 a close pair broke:
                            #       every single-apex candidate around obstacle A ran through B and
                            #       was rejected by the box check -> NO feasible path (TRAILING) and
                            #       B's apex was never captured, so the re-opt only ever knew A.
                            #       2 covers the IFAC two-obstacle format; raise to 3 for triples.
    tail_m: 0.0             # [m]  short raceline (d=0) tail after the return (on_spline horizon)

    # --- feasibility limits ---
    # Curvature is checked CORNER-FAIR: bound the curvature the maneuver ADDS over the raceline
    # (kappa_add_max) AND an absolute steering ceiling (kappa_abs_max). An absolute-only check
    # rejected every offset in a corner (raceline curvature alone ate the budget) -> flat spline,
    # no avoidance. kappa_max is kept only as a DEPRECATED alias of kappa_abs_max.
    kappa_add_max: 5.0      # [1/m] max curvature the maneuver may ADD over the raceline
    kappa_abs_max: 5.5      # [1/m] absolute curvature ceiling (physical min turn radius)
    a_lat_max: 6.0          # [m/s^2] lateral-accel cap used for v = min(v_gb, sqrt(a_lat_max/kappa))
    a_long_max: 4.0         # [m/s^2] longitudinal DECEL; backward pass brakes EARLY into the apex (slow-in)
    a_long_accel: 3.0       # [m/s^2] longitudinal ACCEL; forward pass ramps speed up GRADUALLY out of the
                            #         apex (fast-out). lower = gentler/longer exit acceleration.
    use_grid_check: true    # reject candidates crossing the eroded /map (GridFilter)
    kernel_size: 3          # [cells] GridFilter erosion (8 ate ~0.2 m and rejected the raceline on ifac).
                            #      With trust_grid_bounds this ALSO sets the wall clearance used for
                            #      feasibility (3 cells @0.05 m = 0.15 m ~= half car, matching the
                            #      half_car clearance the waypoint-corridor test used).

    # --- corridor source: measure the drivable width from the MAP, not from the waypoints ---
    # d_left/d_right come from gb_optimizer, which labels the two track contours left/right with ONE
    # global decision taken from the start pose (extract_track_bounds), plus an optional second flip
    # from reverse_mapping. When that comes out inverted the whole lap ships with d_left/d_right
    # EXCHANGED -- measured on map f: 125 of 128 sampled waypoints swapped, values exact mirrors
    # (json L/R = 2.72/0.24 where the walls really are 0.24 left / 2.72 right); map ifac: 0 swapped.
    # The planner then thinks the roomy side is the side the wall is on, samples every terminal
    # offset into that wall, and the corridor filter rejects the genuinely free side -> "candidates
    # on the opposite side of the gap", and with the obstacle pushed to one side the spline is drawn
    # beyond the wall instead of through the open space. The occupancy grid is the only wall source
    # that cannot be mislabelled, so measure the free lateral extent there and let it win.
    # Offline check on the real maps: correct roomy side 60/60 on f and 46/46 on ifac, 0 sampled
    # offsets inside a wall (vs 136 with the waypoint corridor). Cost 0.07 ms/call, <=2 calls/cycle.
    # Set false to force the old waypoint-bounds behaviour (e.g. to reproduce the bug).
    # NOTE: needs use_grid_check: true. The per-point grid test is what REPLACES the waypoint
    # corridor filter; with use_grid_check false the waypoint bounds stay in charge of feasibility
    # (conservative: a swapped map then trails instead of cutting a corner, as it did before).
    trust_grid_bounds: true
    grid_scan_max: 3.0      # [m] half-width of the lateral scan around the raceline (>= widest half-track)
    grid_scan_step: 0.05    # [m] scan resolution; one map cell is the useful floor
    bounds_warn_m: 0.5      # [m] warn when the waypoint bounds and the measured corridor disagree by
                            #      more than this -- near-mirrored values in that warning mean the map's
                            #      global_waypoints.json has d_left/d_right swapped and wants regenerating

    # --- raceline-clear gate (idle when the CURRENT global line already avoids everything) ---
    # After static_reopt swaps in the obstacle-aware line, the keep-out no longer contains d=0,
    # so this planner goes idle: no re-avoidance of an already-cleared obstacle, no apex
    # re-recording (which walked the re-opt line outward every lap), SM stays GB_TRACK.
    clear_gate_enable: true
    clear_hyst_m: 0.03      # [m] EXTRA clearance required to enter idle (leave only on a real violation)
    clear_max_cur_d: 0.15   # [m] gate applies only with the car on the raceline (never abandons a maneuver)

    # --- path commitment (temporal consistency: plan once, reuse) ---
    # The planner re-solved from the car's instantaneous pose every 20 Hz cycle. Once the obstacle
    # came within ramp_len the entry ramp re-anchored to the moving/erroring car and the chosen
    # candidate shifted as the gap shrank, so the car re-avoided the SAME box weirdly on approach.
    # With commitment the chosen path is frozen in the world frame and just re-sliced/re-published;
    # a fresh plan is taken only on a real trigger (car off the path, box moved, slice no longer
    # clears a live box, or maneuver done). Safety is NOT frozen: the committed slice is re-checked
    # against live obstacles every cycle and publishes feasible=False the instant it stops clearing.
    commit_enable: true
    commit_dev_max: 0.35    # [m] drop the commit if the car deviates this far from the committed path
    commit_obs_ds: 0.75     # [m] drop the commit if the triggering box's s drifts this far (re-plan apex)
    commit_obs_dd: 0.40     # [m] ... or its d drifts this far

    # --- cost weights  J = w_d*Σ|d| + w_k*Σκ² + w_c*|d_end-d_end_prev| + w_obs*Σexp(-dist/σ) ---
    w_d: 1.0                # raceline deviation
    w_k: 0.1                # curvature (smoothness)
    w_c: 5.0                # consistency with previous choice (anti-chatter)
    w_obs: 2.0              # soft obstacle proximity
    obs_sigma: 0.5          # [m]  soft-penalty length scale
