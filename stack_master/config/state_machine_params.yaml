state_machine:
  ros__parameters:
    # structural
    rate: 80
    n_loc_wpnts: 80
    timetrials_only: false
    sim: true
    measure: false
    racecar_version: "CAR"
    ot_planner: "predictive_spliner"
    track_length: 1.0
    # geometry / horizons
    gb_ego_width_m: 0.4
    gb_horizon_m: 15.0
    interest_horizon_m: 20.0
    overtaking_horizon_m: 6.9
    emergency_break_horizon: 0.5
    # safety
    volt_threshold: 11.0
    # dynamic (replaces dyn_statemachine_tuner.cfg)
    lateral_width_gb_m: 0.3
    # GB_FREE margin vs STATIC obstacles, distance-independent. Must satisfy
    # gb_ego_width/2 + this + slack <= reactive keep-out + apex_bulge (~0.40 m; the clearance the
    # obstacle-aware line actually has) or the swapped line reads blocked -> phantom TRAILING.
    # Verified by stack_master/scripts/check_avoidance_margins.py.
    lateral_width_static_gb_m: 0.15
    lateral_width_ot_m: 0.3
    splini_hyst_timer_sec: 0.7
    splini_ttl: 2.0
    pred_splini_ttl: 2.0
    overtaking_ttl_sec: 3.0
    ftg_speed_mps: 0.1
    ftg_timer_sec: 3.0
    ftg_active: false
    force_GBTRACK: false
    use_force_trailing: false
    # overtake-decision thresholds (were hardcoded magic numbers in the node)
    getting_closer_rel_vel_mps: -0.1
    # forward gap [m] within which a STATIC obstacle triggers TRAILING->OVERTAKE.
    # larger = commit earlier (less slow-trailing a stationary obstacle). keep <= static_avoidance max_horizon.
    static_ot_distance_m: 12.0
    # transition hysteresis: min time [s] a state is held before switching to a NON-safe state
    # (anti-chatter). Switches toward TRAILING/FTGONLY bypass this. 0.2 s = 16 loops @ 80 Hz.
    min_dwell_sec: 0.2
    # static OVERTAKE splice: keep the reactive path's car-anchored entry (splice from the path
    # START while the car is within splice_start_dist_m of it) instead of the nearest-index cut,
    # which steps the local window laterally under SM lag. Fallback deeper in the maneuver.
    splice_from_path_start: true
    splice_start_dist_m: 0.8
